<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Munchie Matrix — a quick glance at the snacks and drinks available at home." />
  <title>Munchie Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo-mark">MM</div>
    <h1 class="site-title">Munchie Matrix</h1>
    <p class="site-subtitle">What's in the house right now</p>
  </header>

  <main id="app">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <span>Loading the goods…</span>
    </div>
  </main>

  <footer class="site-footer">
    <p>Tap an item to see details</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
